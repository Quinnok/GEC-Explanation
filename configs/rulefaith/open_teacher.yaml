created: "2026-07-19"
provider: "huggingface_seq2seq"
teacher_model: "google/flan-t5-base"
fallback_teacher_model: "google/flan-t5-small"
prompt_version: "rulefaith_open_teacher_v2_plain_text"
input_file: "data/rulefaith/edit_pool.jsonl"
output_file: "data/rulefaith/teacher_candidates_pilot.jsonl"
raw_response_dir: "results/rulefaith/teacher_raw_responses"
parse_failures_file: "results/rulefaith/teacher_parse_failures.jsonl"
stats_file: "results/rulefaith/teacher_generation_stats.json"
limit: 80
candidate_types:
  - natural
  - rule_grounded
local_files_only: true
batch_size: 8
num_beams: 4
max_input_length: 768
max_new_tokens: 128
temperature: 0.0
allowed_teacher_inputs:
  - source
  - model_prediction
  - model_edit
  - edit_span
forbidden_teacher_inputs:
  - reference
  - aligned_reference_edit
  - behavior
  - model_behavior
  - final_human_label
  - annotator_labels
  - gold_correction
