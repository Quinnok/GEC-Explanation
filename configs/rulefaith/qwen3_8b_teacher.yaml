created: "2026-07-20"
provider: "huggingface_causal_chat"
provider_name: "qwen3_8b"
teacher_model: "Qwen/Qwen3-8B"
teacher_model_url: "https://huggingface.co/Qwen/Qwen3-8B"
license: "apache-2.0"
parameter_count: "8.2B"
prompt_version: "rulefaith_qwen3_8b_teacher_v2_source_evidence_no_think_json"
input_file: "data/rulefaith/edit_pool.jsonl"
output_file: "data/rulefaith/teacher_candidates_qwen3_8b_pilot.jsonl"
raw_response_dir: "results/rulefaith/qwen3_8b_teacher_raw_responses"
parse_failures_file: "results/rulefaith/qwen3_8b_teacher_parse_failures.jsonl"
stats_file: "results/rulefaith/qwen3_8b_teacher_generation_stats.json"
limit: 80
candidate_types:
  - natural
  - rule_grounded
local_files_only: false
trust_remote_code: false
device: "auto"
num_threads: 4
max_input_length: 1024
max_new_tokens: 384
enable_thinking: false
do_sample: false
temperature: 0.0
top_p: 1.0
repetition_penalty: 1.05
allowed_teacher_inputs:
  - source
  - model_prediction
  - model_edit
  - edit_span
forbidden_teacher_inputs:
  - reference
  - aligned_reference_edit
  - behavior
  - model_behavior
  - final_human_label
  - annotator_labels
  - gold_correction
notes:
  - "Qwen3-8B is used as a stronger local open teacher candidate source after Qwen2.5-0.5B and Qwen2.5-1.5B failed the positive-teacher prefilter."
  - "Thinking mode is disabled for this pilot to avoid hidden reasoning output and to keep latency closer to Qwen2.5 runs."
  - "Prompt v2 requires evidence_spans to come from SOURCE only, with whitespace-token offsets and exact text equality to SOURCE tokens[start:end]."
  - "Prompt v2 forbids corrected target phrases and MODEL_PREDICTION spans inside evidence_spans."
  - "Generated explanations remain model-generated candidates, not human gold."
